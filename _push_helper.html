function log(msg, cls='info') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
}

async function pushFile(path, b64content) {
  const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`;
  const body = {
    message: `add ${path}`,
    content: b64content
  };
  const resp = await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${TOKEN}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  const data = await resp.json();
  return { ok: resp.ok, status: resp.status, data };
}

async function main() {
  const entries = Object.entries(FILES);
  log(`Pushing ${entries.length} files to ${OWNER}/${REPO}…`);
  let ok = 0, fail = 0;
  for (const [path, content] of entries) {
    try {
      const result = await pushFile(path, content);
      if (result.ok) {
        log(`  ✓ ${path}`, 'ok');
        ok++;
      } else {
        log(`  ✗ ${path}: HTTP ${result.status} — ${JSON.stringify(result.data.message)}`, 'err');
        fail++;
      }
    } catch(e) {
      log(`  ✗ ${path}: ${e.message}`, 'err');
      fail++;
    }
  }
  log('');
  if (fail === 0) {
    log(`✅ All ${ok} files pushed successfully!`, 'ok');
    log(`Repo: https://github.com/${OWNER}/${REPO}`, 'ok');
  } else {
    log(`⚠ ${ok} succeeded, ${fail} failed.`, 'err');
  }
}

main();
</script>
