  <ellipse cx="50" cy="9" rx="10" ry="4" fill="#0066CC"/>
  <rect x="47" y="7" width="6" height="13" rx="2" fill="#0055BB"/>

  <!-- Main dome -->
  <path d="M17 56 C17 29 31 16 50 16 C69 16 83 29 83 56 Z" fill="#0066CC"/>

  <!-- Dome sheen highlight -->
