  <rect x="32" y="28" width="36" height="4" rx="2" fill="#0A2850"/>
  <rect x="32" y="36" width="36" height="4" rx="2" fill="#0A2850"/>
  <rect x="32" y="44" width="36" height="4" rx="2" fill="#0A2850"/>

