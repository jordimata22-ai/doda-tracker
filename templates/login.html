<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ALS DODA Tracker &mdash; Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0D2137;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #112A40;
      border: 1px solid #0066CC;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.45);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .als-badge {
      background: #0066CC;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.5px;
      margin-bottom: 18px;
    }
    .login-title {
      font-size: 22px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: 13px;
      color: #A0AEC0;
      margin-bottom: 28px;
    }
    .error-msg {
      width: 100%;
      background: rgba(255, 59, 48, 0.12);
      border: 1px solid rgba(255, 59, 48, 0.3);
      border-radius: 8px;
      color: #ff7068;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
    }
    .login-form { width: 100%; }
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #A0AEC0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 170, 255, 0.2);
      border-radius: 8px;
      color: #FFFFFF;
      padding: 11px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input::placeholder { color: #A0AEC0; opacity: 0.7; }
    .form-input:focus { border-color: #0066CC; }
    .login-btn {
      width: 100%;
      background: #0066CC;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover { background: #0077EE; }
    .login-btn:active { transform: scale(.98); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="als-badge">ALS</div>
    <div class="login-title">DODA Tracker</div>
    <div class="login-sub">Automated Logistics Systems</div>
    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form class="login-form" method="post" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password" class="form-input"
               placeholder="Enter password" autocomplete="current-password" autofocus />
      </div>
      <button type="submit" class="login-btn">Log In</button>
    </form>
  </div>
</body>
</html>
